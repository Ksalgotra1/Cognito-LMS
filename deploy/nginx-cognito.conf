##############################################################################
# Cognito LMS — Nginx site configuration
#
# Deploy:
#   sudo cp nginx-cognito.conf /etc/nginx/sites-available/cognito
#   sudo ln -s /etc/nginx/sites-available/cognito /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your-domain.com -d www.your-domain.com
#
# Certbot will rewrite this file to add SSL and HTTP→HTTPS redirect.
##############################################################################

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Django collectstatic output
    location /static/ {
        alias /home/cognito/app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media uploads (if applicable)
    location /media/ {
        alias /home/cognito/app/backend/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy everything else to Gunicorn via Unix socket
    location / {
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # This header is what makes Django's SECURE_PROXY_SSL_HEADER work
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Reject payloads > 2MB at Nginx level (Django has its own DATA_UPLOAD_MAX_MEMORY_SIZE)
    client_max_body_size 2M;
}
