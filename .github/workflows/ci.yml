name: Cognito LMS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ═══════════════════════════════════════════════════════════════════════════════
#  BACKEND
# ═══════════════════════════════════════════════════════════════════════════════

jobs:
  backend-lint:
    name: "🔍 Backend Lint (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check (lint)
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Ruff format check (formatting)
        working-directory: backend
        run: ruff format --check .

  backend-security:
    name: "🔒 Backend Security Scan (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        working-directory: backend
        # Skip B101 (assert in tests), B311 (random — used in mock.py for demo data)
        run: |
          bandit -r . \
            --skip B101,B311 \
            --exclude ./venv,./migrations,./__pycache__ \
            -f json -o bandit-report.json || true
          bandit -r . \
            --skip B101,B311 \
            --exclude ./venv,./migrations,./__pycache__ \
            --severity-level medium

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: backend/bandit-report.json
          retention-days: 30

  backend-test:
    name: "🧪 Backend Tests + Coverage"
    runs-on: ubuntu-latest
    needs: [backend-lint]  # Don't waste CI minutes if lint fails

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: dev
      SECRET_KEY: ci-test-secret-key-not-for-production
      REDIS_URL: redis://localhost:6379/0
      AI_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests with coverage
        working-directory: backend
        run: |
          coverage run --source='courses,users' \
            manage.py test courses users --verbosity=2

      - name: Generate coverage report
        working-directory: backend
        run: |
          coverage report -m
          coverage xml -o coverage.xml
          coverage html -d htmlcov

      - name: Enforce minimum coverage threshold (70%)
        working-directory: backend
        run: |
          coverage report --fail-under=70

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          retention-days: 14

      - name: Upload coverage XML (for PR comments / badges)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          retention-days: 14

      - name: Check for missing migrations
        working-directory: backend
        run: |
          python manage.py migrate --run-syncdb
          python manage.py migrate --check

  # ═════════════════════════════════════════════════════════════════════════════
  #  FRONTEND
  # ═════════════════════════════════════════════════════════════════════════════

  frontend-lint:
    name: "🔍 Frontend Lint (ESLint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cognito-frontend/package-lock.json

      - name: Install dependencies
        working-directory: cognito-frontend
        run: npm ci

      - name: ESLint
        working-directory: cognito-frontend
        run: npm run lint

  frontend-build:
    name: "🏗️ Frontend Build Check"
    runs-on: ubuntu-latest
    needs: [frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cognito-frontend/package-lock.json

      - name: Install dependencies
        working-directory: cognito-frontend
        run: npm ci

      - name: Build production bundle
        working-directory: cognito-frontend
        env:
          VITE_BACKEND_URL: https://ci-placeholder.example.com
        run: npm run build

      - name: Check bundle size
        working-directory: cognito-frontend
        run: |
          echo "📦 Production bundle sizes:"
          du -sh dist/
          echo ""
          echo "Largest files:"
          find dist/ -type f -name "*.js" -o -name "*.css" | xargs ls -lhS | head -10

  # ═════════════════════════════════════════════════════════════════════════════
  #  DEPENDENCY AUDIT
  # ═════════════════════════════════════════════════════════════════════════════

  dependency-audit:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python dependency audit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip-audit -r requirements.txt --desc || true
          echo ""
          echo "⚠️  Non-zero exit above means known vulnerabilities exist in pinned deps."

      # Node dependency audit
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cognito-frontend/package-lock.json

      - name: Audit Node dependencies
        working-directory: cognito-frontend
        run: |
          npm audit --omit=dev || true
          echo ""
          echo "⚠️  Non-zero exit above means known vulnerabilities exist in npm deps."

  # ═════════════════════════════════════════════════════════════════════════════
  #  GATE — blocks merge if critical jobs fail
  # ═════════════════════════════════════════════════════════════════════════════

  ci-gate:
    name: "✅ CI Gate"
    runs-on: ubuntu-latest
    needs: [backend-test, backend-security, frontend-build, dependency-audit]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "Backend Test:     ${{ needs.backend-test.result }}"
          echo "Backend Security: ${{ needs.backend-security.result }}"
          echo "Frontend Build:   ${{ needs.frontend-build.result }}"
          echo "Dep Audit:        ${{ needs.dependency-audit.result }}"

          # Hard fail on test or build failures
          if [[ "${{ needs.backend-test.result }}" != "success" ]]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-build.result }}" != "success" ]]; then
            echo "❌ Frontend build failed"
            exit 1
          fi

          # Warn but don't block on security/audit (advisory)
          if [[ "${{ needs.backend-security.result }}" != "success" ]]; then
            echo "⚠️  Security scan had findings — review the Bandit report artifact"
          fi
          if [[ "${{ needs.dependency-audit.result }}" != "success" ]]; then
            echo "⚠️  Dependency audit had findings — review before deploying"
          fi

          echo "✅ CI gate passed"
