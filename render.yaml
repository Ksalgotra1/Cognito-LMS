# Render Infrastructure-as-Code Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cognito-lms-api
    runtime: python
    rootDir: .
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd backend && gunicorn mysite.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SITE_URL
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4o
      - key: AI_API_KEY
        sync: false
